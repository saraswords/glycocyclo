<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlycoCyclo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HOME SCREEN -->
<div id="home">

  <div id="home-header">
    <h1>GlycoCyco</h1>
    <img src="assets/glucose.png" id="glucose-hero">
  </div>

  <p>
    Drag and drop the enzymes or molecules to their correct spot on the metabolic pathway diagrams.<br><br>
    If you're feeling confident, try <b>hardcore mode!</b>
  </p>

  <!-- GLYCOLYSIS -->
  <div class="pathway-section">
    <h2>Glycolysis</h2>

    <button class="active-btn" onclick="startGame('glycolysis','enzymes')">
      Enzymes
    </button>

    <button class="disabled-btn"
      onclick="showComingSoon(this, 'Products'); setTimeout(() => resetButton(this, 'Products'), 1200)">
      Products
    </button>

    <button class="disabled-btn"
      onclick="showComingSoon(this, 'Hardcore'); setTimeout(() => resetButton(this, 'Hardcore'), 1200)">
      Hardcore
    </button>
  </div>

  <!-- CAC -->
  <div class="pathway-section">
  <h2>Citric Acid Cycle</h2>

  <button class="disabled-btn"
    onclick="showComingSoon(this, 'Enzymes'); setTimeout(() => resetButton(this, 'Enzymes'), 1200)">
    Enzymes
  </button>

  <button class="disabled-btn"
    onclick="showComingSoon(this, 'Products'); setTimeout(() => resetButton(this, 'Products'), 1200)">
    Products
  </button>

  <button class="disabled-btn"
    onclick="showComingSoon(this, 'Hardcore'); setTimeout(() => resetButton(this, 'Hardcore'), 1200)">
    Hardcore
  </button>
</div>
  </div>

</div>

<!-- GAME SCREEN -->
<div id="game" style="display:none;">

  <h2 id="mode-title"></h2>

  <div id="game-container">
    <img id="background" src="">
    <div id="overlay"></div>
  </div>

  <div id="choices"></div>

  <br>
  <button onclick="goHome()">← Back</button>

</div>

<script src="script.js"></script>
</body>
</html>
