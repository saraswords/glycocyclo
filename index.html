<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlycoCyclo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="home">

  <div id="home-header">
    <h1>GlycoCyclo</h1>
    <img src="assets/glucose.png" id="glucose-hero">
  </div>

  <p>
    Drag or tap to complete the carbohydrate metabolism processes.<br><br>
    If you're feeling confident, try <b>hardcore mode</b>!
  </p>

  <!-- GLYCOLYSIS -->
  <div class="pathway-section">
    <h2>Glycolysis</h2>
    <button onclick="startGame('glycolysis','enzymes')">Enzymes</button>
    <button onclick="startGame('glycolysis','products')">Products</button>
    <button class="disabled">Hardcore</button>
  </div>

  <!-- GLUCONEOGENESIS -->
  <div class="pathway-section">
    <h2>Gluconeogenesis</h2>
    <button class="disabled">Enzymes</button>
    <button class="disabled">Products</button>
    <button class="disabled">Hardcore</button>
  </div>

  <!-- CAC -->
  <div class="pathway-section">
    <h2>Citric Acid Cycle</h2>
    <button onclick="startGame('cac','enzymes')">Enzymes</button>
    <button class="disabled">Products</button>
    <button class="disabled">Hardcore</button>
  </div>

</div>

<!-- GAME -->

<div id="game" style="display:none;">
  <div id="game-container">
    <img id="background" src="">
    <div id="overlay"></div>

    <div id="enzyme-info" class="hidden">
      <h4 id="enzyme-title"></h4>
      <p id="enzyme-desc"></p>
    </div>
  </div>

  <div id="choices"></div>

  <br>
  <button onclick="goHome()">← Back</button>
</div>

<script src="core.js"></script>
<script src="enzymes.js"></script>
<script src="products.js"></script>

</body>
</html>
